<script>
// ── URL ROUTING ──────────────────────────────────────────────
// Maps URL slugs to overlay IDs
const routeMap = {
  'ignisai': 'ignisai',
  'sentinelpay': 'sentinelpay',
  'fedaudit': 'fedaudit',
  'p2p-lending': 'p2p',
  'nba': 'nba',
  'kepler': 'kepler',
  'crowdpulse': 'crowdpulse',
  'harbor': 'harbor',
  'midatlantic': 'midatlantic',
  'rougir': 'rougir',
  'dhl': 'dhl',
  'tournament': 'tournament',
  'montecarlo': 'montecarlo',
  'cemex': 'cemex',
  'wolters-kluwer': 'wolterskluwer',
  'carmax': 'carmax',
  'clearpath': 'clearpath',
  'warby-parker': 'warby',
  'acme': 'acme',
  'halloran': 'halloran',
  'west-marine': 'westmarine',
  'kl-worldwide': 'klworldwide'
};

function openOv(id) {
  var ov = document.getElementById('ov-' + id);
  if (!ov) { console.error('overlay not found: ov-' + id); return; }
  document.getElementById('mv').style.display = 'none';
  ov.classList.add('on');
  ov.scrollTop = 0;
  window.scrollTo(0, 0);
  // Push URL
  var slug = Object.keys(routeMap).find(function(k){ return routeMap[k] === id; }) || id;
  history.pushState({ overlay: id }, '', '/' + slug);
  setTimeout(function() {
    ov.querySelectorAll('.bfill').forEach(function(b) {
      b.style.width = (b.dataset.w || 0) + '%';
    });
  }, 500);
}

function closeOv() {
  document.querySelectorAll('.ov').forEach(function(o) { o.classList.remove('on'); });
  document.getElementById('mv').style.display = 'block';
  window.scrollTo(0, 0);
  history.pushState({}, '', '/');
}

// Handle browser back/forward
window.addEventListener('popstate', function(e) {
  if (e.state && e.state.overlay) {
    var ov = document.getElementById('ov-' + e.state.overlay);
    if (ov) {
      document.getElementById('mv').style.display = 'none';
      document.querySelectorAll('.ov').forEach(function(o) { o.classList.remove('on'); });
      ov.classList.add('on');
      ov.scrollTop = 0;
      window.scrollTo(0, 0);
    }
  } else {
    document.querySelectorAll('.ov').forEach(function(o) { o.classList.remove('on'); });
    document.getElementById('mv').style.display = 'block';
    window.scrollTo(0, 0);
  }
});

// On page load, check if URL has a slug and open that overlay
(function() {
  var path = window.location.pathname.replace(/^\//, '').replace(/\/$/, '');
  if (path && routeMap[path]) {
    openOv(routeMap[path]);
  }
})();

document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeOv(); });
</script>
